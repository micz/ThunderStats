<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" height="24" width="24" version="1.1" viewBox="0 0 24 24">
  <!-- Compare periods icon: two overlapping bar charts -->
  <rect x="2" y="2" width="20" height="20" rx="2" fill="#3498db"/>
  <!-- Bar A (left, blue-dark) -->
  <rect x="4" y="8" width="4" height="12" rx="1" fill="#2c3e50"/>
  <rect x="9" y="5" width="4" height="15" rx="1" fill="#2c3e50"/>
  <!-- Bar B (right, lighter) -->
  <rect x="6" y="10" width="4" height="10" rx="1" fill="#ecf0f1" opacity="0.8"/>
  <rect x="11" y="7" width="4" height="13" rx="1" fill="#ecf0f1" opacity="0.8"/>
  <!-- Divider line -->
  <line x1="17" y1="4" x2="17" y2="20" stroke="#2c3e50" stroke-width="1.5" stroke-dasharray="2,2"/>
  <!-- A and B labels -->
  <text x="8" y="6" font-size="5" font-weight="bold" fill="#ecf0f1" text-anchor="middle" font-family="sans-serif">A</text>
  <text x="20" y="13" font-size="5" font-weight="bold" fill="#ecf0f1" text-anchor="middle" font-family="sans-serif">B</text>
</svg>
